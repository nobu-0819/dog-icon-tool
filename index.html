<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日の犬アイコン生成ツール</title>

<style>
body{
    font-family:sans-serif;
    background:#f4f4f4;
    padding:30px;
    text-align:center;
}

h1{
    color:#333;
}

button{
    background:#ff7b54;
    color:white;
    border:none;
    padding:15px 30px;
    font-size:18px;
    border-radius:12px;
    cursor:pointer;
    margin:10px;
}

#result{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:15px;
    max-width:760px;
    margin-left:auto;
    margin-right:auto;
    text-align:left;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    white-space:pre-wrap;
    line-height:1.8;
}
</style>
</head>

<body>

<h1>🐶 今日の犬アイコン生成ツール</h1>

<button onclick="generatePrompt()">今日の画像を作る</button>
<button onclick="copyPrompt()">コピーする</button>

<div id="result">ここに今日のプロンプトが表示されます</div>

<script>
const dogProfile = `
【犬の固定設定】
実在する犬らしさを保つ。
擬人化しすぎない。

小型のヨークシャーテリア寄りのミックス犬。
体は小さく、やや細身でコンパクト。
自然な犬らしい体型。

体の毛は短めにトリミングされている。
体色は黒〜濃いグレー、シルバーグレーが中心。

顔まわりは少しふわっとしている。
頬、口まわり、眉、胸、足先に温かい茶色〜タン色の毛がある。

目は大きめで、深い茶色。
丸みのあるアーモンド形。
感情が伝わる、少しうるっとした表情の目。

鼻は小さめの黒い鼻。
マズルは短すぎず長すぎない。
口まわりに茶色のふわっとした毛がある。

明るい茶色の眉毛がはっきりある。
この眉毛は重要。

耳は大きめの三角形。
左右で少し形が違う。
片耳が少し立ち、もう片方が少し寝るような自然な耳。
耳の毛は少しふわっとしている。

全体的に、眠そうで賢そうで、少し切ない可愛さがある。

過度にプードルっぽくしない。
毛をモコモコにしすぎない。
鼻を長くしすぎない。
目をアニメのように大きくしすぎない。
別犬にしない。
`;

const themes = [
"浮世絵風",
"サイバーパンク風",
"ピカソ風",
"落書き風",
"映画ポスター風",
"80年代アニメ風",
"ガチャガチャ景品風",
"ぬいぐるみ風",
"LINEスタンプ風",
"油絵風",
"海外アニメ風",
"優しい絵本風",
"シュールな現代アート風",
"レトロゲーム風",
"新聞広告風",
"ゴジラ映画風",
"昭和レトロ広告風",
"週刊誌表紙風",
"都市伝説風",
"ホラー映画風",
"エモい青春映画風",
"深夜番組風",
"ニュース速報風",
"ファンタジーRPG風",
"中世ヨーロッパ風",
"未来都市風",
"廃墟アート風",
"水墨画風",
"切り絵風",
"ヴィンテージ写真風",
"アメコミ風",
"たまごっち風",
"フィギュア箱風",
"プラモデル箱絵風",
"ゲーム実況サムネ風",
"YouTubeサムネ風",
"AI暴走風",
"異世界転生風",
"ラスボス風",
"巨大怪獣風",
"ゆるキャラ風",
"高級雑誌風",
"サウナ雑誌表紙風"
];

const situations = [
"夜の街を歩いている",
"宇宙にいる",
"温泉に入っている",
"巨大化している",
"コンビニ店員になっている",
"魔法使いになっている",
"ラーメンを食べている",
"空を飛んでいる",
"雨の日にたそがれている",
"サウナでととのっている",
"コンビニでバイトしている",
"巨大ロボに乗っている",
"電車で寝ている",
"ラーメン屋を経営している",
"温泉街を歩いている",
"屋台でたこ焼きを焼いている",
"サウナ後に外気浴している",
"深夜の自販機の前にいる",
"無人島で焚き火している",
"宇宙船を操縦している",
"ホラーゲームから逃げている",
"魔王になっている",
"勇者になっている",
"巨大プリンを食べている",
"海辺で黄昏れている",
"渋谷スクランブル交差点にいる",
"銭湯の番台をしている",
"ガチャガチャの中に閉じ込められている",
"雪山で遭難しかけている",
"中華料理を爆食いしている",
"夜景を見ながら泣いている",
"カラオケで熱唱している",
"ゲームセンターで遊んでいる",
"昭和の喫茶店にいる"
];

const moods = [
"かわいい",
"エモい",
"切ない",
"狂気",
"意味不明",
"圧倒的",
"ダーク",
"神秘的",
"幸せそう",
"眠そう",
"絶望感",
"テンションMAX",
"シュール",
"孤独感",
"青春感"
];

function generatePrompt(){
    const randomTheme = themes[Math.floor(Math.random() * themes.length)];
    const randomSituation = situations[Math.floor(Math.random() * situations.length)];
    const randomMood = moods[Math.floor(Math.random() * moods.length)];

    const prompt =
`今日のテーマ：
${randomTheme}

シチュエーション：
${randomSituation}

感情：
${randomMood}

画像生成プロンプト：

${dogProfile}

${randomTheme} の世界観で、
${randomSituation}。

全体の雰囲気は
「${randomMood}」。

感情が伝わる演出。

LINEアイコン向け。
正方形。
中央構図。
顔と目の印象を重視。
高品質。`;

    document.getElementById("result").innerText = prompt;
}

function copyPrompt(){
    const text = document.getElementById("result").innerText;

    navigator.clipboard.writeText(text)
    .then(function(){
        alert("プロンプトをコピーしました！");
    })
    .catch(function(){
        alert("コピーに失敗しました。文章を長押ししてコピーしてください。");
    });
}
</script>

</body>
</html>
